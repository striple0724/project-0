server:
  address: 127.0.0.1
  port: ${SERVER_PORT:19100}

spring:
  datasource:
    url: jdbc:h2:mem:taxworkbench;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
      max-lifetime: 1800000
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

logging:
  file:
    path: ./logs/local

app:
  security:
    require-auth: true
  runtime:
    public-base-url: http://localhost:${SERVER_PORT:19100}
  cors:
    allowed-origins:
      - http://localhost:5173
    allowed-origin-patterns:
      - http://localhost:*
      - http://127.0.0.1:*
