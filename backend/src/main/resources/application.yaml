spring:
  application:
    name: tax-workbench-api
  profiles:
    default: local-fast
    group:
      local: local-fast
  servlet:
    multipart:
      max-file-size: ${app.limits.upload.max-file-size}
      max-request-size: ${app.limits.upload.max-request-size}
mybatis:
  mapper-locations: classpath:/mapper/*.xml
  type-aliases-package: com.taxworkbench.api.infrastructure.mybatis.model
  configuration:
    map-underscore-to-camel-case: true

server:
  port: ${SERVER_PORT:19100}
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
    session:
      timeout: 30m
  tomcat:
    threads:
      max: 200
      min-spare: 10
    accept-count: 100
    max-connections: 8192

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  pattern:
    level: "%5p [req:%X{requestId:-N/A}]"

app:
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
  security:
    require-auth: false
    crypto-key-base64: ${APP_CRYPTO_KEY_BASE64:}
  cors:
    allowed-origins:
      - http://localhost:5173
  runtime:
    public-base-url: http://localhost:${SERVER_PORT:19100}
  hosts:
    local: http://localhost:${SERVER_PORT:19100}
    dev: https://dev-api.example.com
    prod: https://api.example.com
  seed:
    large:
      enabled: false
      client-count: 5000
      work-item-count: 100000
  limits:
    upload:
      max-file-size: 20MB
      max-request-size: 30MB
    download:
      max-bytes: 52428800
  performance:
    bulk-chunk-size: 2000
    export-page-size: 5000
    selected-export-chunk-size: 5000

