server:
  address: 0.0.0.0
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:prod-db.internal}:${DB_PORT:5432}/${DB_NAME:taxworkbench}}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:40}
      minimum-idle: ${DB_POOL_MIN:10}
      connection-timeout: ${DB_POOL_CONN_TIMEOUT_MS:20000}
      max-lifetime: ${DB_POOL_MAX_LIFETIME_MS:1800000}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
    open-in-view: false

logging:
  file:
    path: ${LOG_PATH:/var/log/tax-workbench/prod}

app:
  security:
    require-auth: true
  runtime:
    public-base-url: ${PUBLIC_BASE_URL}
  cors:
    allowed-origins:
      - ${FRONTEND_ORIGIN}
  limits:
    upload:
      max-file-size: ${UPLOAD_MAX_FILE_SIZE:50MB}
      max-request-size: ${UPLOAD_MAX_REQUEST_SIZE:60MB}
    download:
      max-bytes: ${DOWNLOAD_MAX_BYTES:157286400}
